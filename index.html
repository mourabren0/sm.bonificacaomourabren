<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Link na Bio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1f1f1f);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    img {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    h1 {
      margin-bottom: 25px;
    }

    .link {
      display: block;
      background: #ffffff;
      color: #000;
      padding: 12px;
      margin: 10px 0;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .link:hover {
      background: #cccccc;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="https://via.placeholder.com/120" alt="Foto">
    <h1>Mora Breno</h1>

    <a class="link" href="#">Instagram</a>
    <a class="link" href="#">WhatsApp</a>
    <a class="link" href="#">YouTube</a>
  </div>

</body>
</html>

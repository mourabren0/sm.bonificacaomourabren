<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Link na Bio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #0A0A0A, #141414);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .social-icons img {
      width: 28px;
      height: 28px;
      filter: invert(1);
      transition: 0.3s;
    }

    .social-icons img:hover {
      transform: scale(1.2);
    }

    img {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    h1 {
      margin-bottom: 25px;
    }

    .link {
      display: block;
      background: #ffffff;
      color: #000;
      padding: 12px;
      margin: 10px 0;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .link:hover {
      background: #cccccc;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="https://via.placeholder.com/120" alt="Foto">
    <h1>Mora Breno</h1>

<div class="social-icons">

    <a href="https://wa.me/5547988244385"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"></a>
  </div>

    <a class="link" href="#">Instagram</a>
    <a class="link" href="#">WhatsApp</a>
    <a class="link" href="#">YouTube</a>
  </div>

</body>
</html>
